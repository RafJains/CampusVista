name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e python-common

      - name: Python syntax checks
        run: python -m compileall python-backend python-tools python-common

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android build and unit tests
        working-directory: android-app
        run: |
          ./gradlew :app:testDebugUnitTest :app:assembleDebug --warning-mode all
