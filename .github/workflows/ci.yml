name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e python-common
          pip install -r python-backend/requirements.txt
          pip install -r python-tools/requirements.txt

      - name: Backend tests
        run: python -m unittest discover -s python-backend/tests

      - name: Data pipeline tests
        run: python -m unittest discover -s python-tools/tests

      - name: Recognition benchmark
        run: python python-tools/scripts/benchmark_recognition.py --json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android build and unit tests
        working-directory: android-app
        run: |
          ./gradlew :app:testDebugUnitTest :app:assembleDebug :app:assembleDebugAndroidTest --warning-mode all
